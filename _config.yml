name: The Costa Graphical User Interface
description: Costa is a small and lightweight GUI (Graphical User Interface) for MS-DOS compatible systems, provided to you free of charge.
author: Jacob Palm
markdown: kramdown
baseURL: https://costa.jacobpalm.dk

plugins:
  - jekyll-feed

kramdown:
  syntax_highlighter: rouge

collections:
  archive:
    output: true

defaults:
  - scope:
      path: ""
      type: "archive"
    values:
      layout: "archive"