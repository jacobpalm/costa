---
layout: default
---
<div class="white">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2">
                <h4>{{ page.heading }}</h4>
                <p><<a href="{{"/assets/img/blog/" | prepend: site.baseurl | append : post.img}}"><img src="{{"/assets/img/blog/" | prepend: site.baseurl | append : post.img}}" alt="Screenshot" style="float:right; width: 320px; height: 240px; padding: 0px 0px 20px 20px;"></a></p>
                <p>{{ page.description }}</p>
                <hr>
                <p><a href="{{ site.baseURL }}/{{ page.origin }}">Back</a></p>
            </div>
        </div>
    </div>
</div>
